<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="logo logo-light" src="../icons/icon-light.png" alt="GlideRead">
      <img class="logo logo-dark" src="../icons/icon-dark.png" alt="GlideRead">
      <span class="title" data-i18n="appName">GlideRead</span>
    </div>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
      <span id="status-text" class="status-text">ON</span>
      <span id="status-dot" class="status-dot"></span>
    </div>
    <div id="site-status" class="site-status" data-i18n="checkingSite">
      Checking current site...
    </div>
    <div class="footer">
      <a id="settings-link" class="settings-link" data-i18n="settings">Settings</a>
      <span class="credit">by <a href="https://chihao.li" target="_blank">psylch</a></span>
    </div>
  </div>
  <script src="../utils/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
